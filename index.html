<style>
    :root {
      --red: #ff3a2b;
      --blue: #72cfff;
      --green: #38ff23;
      --ink: #111;
    }

    * { box-sizing: border-box; }
    html, body {
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: 'Press Start 2P Embedded', 'Press Start 2P', monospace;
      color: var(--ink);
      user-select: none;
    }
    body { display: grid; place-items: center; touch-action: manipulation; }
    html { -webkit-text-size-adjust: 100%; }

    .app {
      position: relative;
      touch-action: manipulation;
      width: min(100vw, 1100px);
      height: 100vh;
      max-height: 760px;
      background: #fff;
      overflow: hidden;
      --frame-inset: 8px;
      --frame-thickness: 8px;
    }
    .app::before,
    .app::after {
      content: '';
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }
    .app::before {
      inset: var(--frame-inset);
      background:
        linear-gradient(var(--red), var(--red)) left top / 100% var(--frame-thickness) no-repeat,
        linear-gradient(var(--red), var(--red)) left top / var(--frame-thickness) 100% no-repeat;
      opacity: 0.92;
      filter: drop-shadow(0 0 1px rgba(255,58,43,0.24));
      animation: siteFrameRedShift 4.8s ease-in-out infinite;
    }
    .app::after {
      inset: var(--frame-inset);
      background:
        linear-gradient(var(--blue), var(--blue)) right top / var(--frame-thickness) 100% no-repeat,
        linear-gradient(var(--blue), var(--blue)) left bottom / 100% var(--frame-thickness) no-repeat;
      opacity: 0.82;
      filter: drop-shadow(0 0 1px rgba(114,207,255,0.24));
      animation: siteFrameBlueShift 4.8s ease-in-out infinite reverse;
    }
    @keyframes siteFrameRedShift {
      0%, 100% { transform: translate(0, 0) skewX(0deg); }
      35% { transform: translate(2px, -1px) skewX(-0.35deg); }
      68% { transform: translate(-1px, 1px) skewX(0.25deg); }
    }
    @keyframes siteFrameBlueShift {
      0%, 100% { transform: translate(0, 0) skewY(0deg); }
      40% { transform: translate(2px, 1px) skewY(0.25deg); }
      72% { transform: translate(-2px, -1px) skewY(-0.25deg); }
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      background: #fff;
    }
    .screen.active { display: block; }
    #startScreen.active, #scoreScreen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 118px;
    }
    body:not([data-ui-ready="1"]) #startScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 118px;
    }
    body:not([data-ui-ready="1"]) #gameScreen,
    body:not([data-ui-ready="1"]) #scoreScreen {
      display: none !important;
    }

    .center-stack {
      position: static;
      transform: none;
      width: min(520px, 88vw);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: min(390px, 72vw);
      margin-top: -14px;
      margin-left: 10px;
      image-rendering: pixelated;
      filter: drop-shadow(6px 6px 0 #000);
      animation: logoArcadeGlitch 1.18s steps(2, end) infinite, crtFlicker 1.65s steps(2, end) infinite;
      transform-origin: center;
      will-change: transform, filter;
    }
    .subtitle {
      margin-top: 4px;
      color: #fff;
      font-size: clamp(10px, 0.96vw, 13px);

    .footer {

    .meta-row {

      bottom: 0;
      width: 25%;

      cursor: pointer;
    }
    .lane.l0 { left: 0; }

      display: none;

    .targets {

    .target-box {

      height: clamp(118px, 11vw, 146px);
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.34);
      border: 6px solid rgba(0,0,0,0.92);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.24);
      clip-path: polygon(10% 0, 90% 0, 90% 10%, 100% 10%, 100% 90%, 90% 90%, 90% 100%, 10% 100%, 10% 90%, 0 90%, 0 10%, 10% 10%);

    .subtitle,

    @keyframes charStaggerHover {
      0% { transform: translateY(0) scale(1); }

      100% { transform: translateY(0) scale(1); }

    .hover-stagger { cursor: default; }

      display: inline-block;
      will-change: transform;
    }
    @media (hover: hover) {
      .hover-stagger:hover .char {
        animation: charStaggerHover 0.34s steps(3, end);
        animation-delay: calc(var(--char-index) * 16ms);
      }
    }
    .score-wrap .pixel-btn { margin-top: 34px; padding-left: 26px; padding-right: 26px; }

    @media (min-width: 1200px) {
      .app { width: min(100vw, 1400px); }
      .center-stack { width: 560px; }
      .logo { width: 430px; }
      #startScreen .footer, #scoreScreen .footer { margin-top: 38px; }
    }

    @media (max-width: 760px) {
      body {
        display: block;
      }
      .app {
        width: 100vw;
        height: 100dvh;
        max-height: none;
        --frame-inset: 6px;
        --frame-thickness: 3px;
      }
      #startScreen.active, #scoreScreen.active {
        padding: 18px 14px 116px;
      }
      .center-stack {
        width: min(92vw, 420px);
      }
      .logo {
        width: min(320px, 82vw);
        margin-top: -18px;
        margin-left: 8px;
      }
      .promo {
        font-size: clamp(16px, 4.8vw, 21px);
        margin-top: 22px;
      }
      .prompt {
        margin-top: 18px;
      }
      .handle-input {
        width: min(240px, 74vw);
        font-size: 16px;
      }
      .footer {
        bottom: 22px;
        gap: 6px;
      }
      .footer img {
        width: 42px;
        height: 42px;
      }
      .copyright {
        margin-top: 5px;
        font-size: 8px;
        letter-spacing: -0.7px;
      }
      .game-shell {
        position: absolute;
        inset: 0;
        max-width: none;
        margin: 0 auto;
        padding: 28px 16px 150px;
      }
      .life-bar {
        height: 14px;
      }
      .score-number {
        top: -2px;
        font-size: clamp(36px, 11vw, 52px);
      }
      .meta-row {
        margin-top: 18px;
        font-size: 8px;
        gap: 10px;
      }
      .playfield {
        height: calc(100% - 70px);
        margin-top: 16px;
      }
      .lane::after {
        content: none;
      }
      .hit-line {
        display: none;
      }
      .targets {
        bottom: 42px;
      }
      .target-box {
        width: min(22vw, 92px);
        height: min(22vw, 92px);
      }
      .target-box::before {
        inset: 8px;
        border-width: 3px;
      }
      .note {
        width: min(21vw, 88px);
        height: min(21vw, 88px);
      }
      .feedback {
        top: 42%;
        font-size: clamp(18px, 7vw, 28px);
      }
      .score-wrap {
        width: min(96vw, 520px);
      }
      table.scores {
        min-width: min(340px, 94vw);
      }
      table.scores th, table.scores td {
        padding: 4px 6px;
      }
      .helper {
        max-width: 92vw;
      }
    }
  </style>
</head>

    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const scoreScreen = document.getElementById('scoreScreen');
    const usernameInput = document.getElementById('usernameInput');
    const startForm = document.getElementById('startForm');
    const playButton = document.getElementById('playButton');
    const playAgainButton = document.getElementById('playAgainButton');
    const playfield = document.getElementById('playfield');
    const lifeFill = document.getElementById('lifeFill');
    const scoreNumber = document.getElementById('scoreNumber');
    const missesLeft = document.getElementById('missesLeft');
    const speedLevel = document.getElementById('speedLevel');
    const feedback = document.getElementById('feedback');
    const scoresBody = document.getElementById('scoresBody');
    const finalPlayer = document.getElementById('finalPlayer');
    const finalScore = document.getElementById('finalScore');

    const targets = {
      ArrowLeft: document.getElementById('targetLeft'),
      ArrowDown: document.getElementById('targetDown'),
      ArrowUp: document.getElementById('targetUp'),
      ArrowRight: document.getElementById('targetRight')
    };

    const laneElements = Array.from(playfield.querySelectorAll('.lane'));
    const laneTapMap = ['ArrowLeft', 'ArrowDown', 'ArrowUp', 'ArrowRight'];

    const lanes = {
      ArrowLeft: { index: 0, asset: ARROW_ASSETS.red, cls: 'rot-left' },
      ArrowDown: { index: 1, asset: ARROW_ASSETS.blue, cls: 'dir-down' },
      ArrowUp: { index: 2, asset: ARROW_ASSETS.red, cls: 'dir-up rot-up' },
      ArrowRight: { index: 3, asset: ARROW_ASSETS.blue, cls: 'rot-right' }
    };

    const STORAGE_KEY = 'arrowmaniaTop5';
    const MAX_MISSES = 4;
    const IS_MOBILE_INPUT = /iPhone|iPod|Android|Mobile|iPad/i.test(navigator.userAgent || '') || ((navigator.maxTouchPoints || 0) > 0 && window.innerWidth <= 1024) || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
    const PERFECT_WINDOW = IS_MOBILE_INPUT ? 28 : 52;
    const GOOD_WINDOW = IS_MOBILE_INPUT ? 52 : 92;
    const BASE_SPEED_LEVEL = 5;
    const BASE_SPAWN_DELAY = 620;
    const BASE_NOTE_TRAVEL_TIME = 1740;

    let username = '';
    let score = 0;
    let misses = MAX_MISSES;
    let gameActive = false;
    let notes = [];
    let spawnTimer = null;
    let animationFrame = null;
    let startedAt = 0;
    let spawnDelay = BASE_SPAWN_DELAY;
    let noteTravelTime = BASE_NOTE_TRAVEL_TIME;

    function showScreen(screen) {
      [startScreen, gameScreen, scoreScreen].forEach(el => el.classList.remove('active'));
      screen.classList.add('active');
    }

    function resetViewportPosition() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
    }

    function resetGame() {
      notes.forEach(note => note.el.remove());
      notes = [];
      score = 0;
      misses = MAX_MISSES;
      spawnDelay = BASE_SPAWN_DELAY;
      noteTravelTime = BASE_NOTE_TRAVEL_TIME;
      startedAt = performance.now();
      scoreNumber.textContent = '0';
      missesLeft.textContent = '4';
      speedLevel.textContent = String(BASE_SPEED_LEVEL);
      feedback.textContent = '';
      feedback.className = 'feedback';
      lifeFill.style.width = '100%';
      lifeFill.style.background = 'var(--green)';
    }

    function startGame() {
      username = (usernameInput.value || 'player1').trim().slice(0, 16) || 'player1';
      resetGame();
      gameActive = true;
      showScreen(gameScreen);
      resetViewportPosition();
      requestAnimationFrame(resetViewportPosition);
      setTimeout(resetViewportPosition, 120);
      scheduleSpawn();
      animationFrame = requestAnimationFrame(updateGame);
    }

    function endGame() {
      gameActive = false;
      clearTimeout(spawnTimer);
      cancelAnimationFrame(animationFrame);
      saveScore();
      finalPlayer.textContent = username.toUpperCase();
      finalScore.textContent = String(score);
      renderScores();
      showScreen(scoreScreen);
    }

    function scheduleSpawn() {
      if (!gameActive) return;
      const elapsed = performance.now() - startedAt;
      spawnDelay = Math.max(390, BASE_SPAWN_DELAY - elapsed / 24);
      noteTravelTime = Math.max(1160, BASE_NOTE_TRAVEL_TIME - elapsed / 14);
      speedLevel.textContent = String(BASE_SPEED_LEVEL + Math.floor((BASE_SPAWN_DELAY - spawnDelay) / 60));
      spawnTimer = setTimeout(() => {
        spawnNote();
        scheduleSpawn();
      }, spawnDelay);
    }

    function spawnNote() {
      const keys = Object.keys(lanes);
      const key = keys[Math.floor(Math.random() * keys.length)];
      const lane = lanes[key];
      const laneEl = laneElements[lane.index];
      const note = document.createElement('div');
      note.className = 'note';
      note.style.setProperty('--note-y', '-120px');
      note.innerHTML = `<img class="${lane.cls}" src="${lane.asset}" alt="falling arrow png">`;
      laneEl.appendChild(note);
      notes.push({ key, el: note, spawnTime: performance.now(), judged: false, y: -120 });
    }

    function updateGame(now) {
      if (!gameActive) return;
      const hitY = playfield.clientHeight - 202;
      for (let i = notes.length - 1; i >= 0; i--) {
        const note = notes[i];
        const progress = (now - note.spawnTime) / noteTravelTime;
        const y = -120 + (hitY + 120) * progress;
        note.y = y;
        note.el.style.setProperty('--note-y', y + 'px');
        if (!note.judged && progress > 1.08) {
          note.judged = true;
          note.el.remove();
          notes.splice(i, 1);
          registerMiss();
        }
      }
      animationFrame = requestAnimationFrame(updateGame);
    }

    function pulseScoreBoard() {
      scoreNumber.classList.remove('pop');
      void scoreNumber.offsetWidth;
      scoreNumber.classList.add('pop');
      setTimeout(() => scoreNumber.classList.remove('pop'), 240);
    }

    function showFeedbackMessage(label, kind) {
      feedback.textContent = label;
      feedback.className = 'feedback ' + kind;
      feedback.style.animation = 'none';
      void feedback.offsetWidth;
      feedback.style.animation = '';
      feedback.classList.add('show');
    }

    function flashScoringTarget(key) {
      const target = targets[key];
      if (!target) return;
      target.classList.remove('hit-flash');
      void target.offsetWidth;
      target.classList.add('hit-flash');
      setTimeout(() => target.classList.remove('hit-flash'), 300);
    }

    function registerHit(kind, key) {
      score += kind === 'perfect' ? 2 : 1;
      scoreNumber.textContent = String(score);
      pulseScoreBoard();
      flashScoringTarget(key);
      showFeedbackMessage(kind === 'perfect' ? 'PERFECT' : 'GOOD', kind);
    }

    function registerMiss() {
      misses -= 1;
      missesLeft.textContent = String(Math.max(0, misses));
      showFeedbackMessage('MISS', 'miss');
      const pct = Math.max(0, (misses / MAX_MISSES) * 100);
      lifeFill.style.width = pct + '%';
      lifeFill.style.background = pct <= 25 ? '#ff4a4a' : pct <= 50 ? '#ffbb39' : 'var(--green)';
      if (misses <= 0) endGame();
    }

    function hitClosest(key) {
      const hitY = playfield.clientHeight - 202;
      const candidates = notes
        .map((note, index) => ({ note, index }))
        .filter(item => item.note.key === key && !item.note.judged)
        .map(item => ({ ...item, distance: Math.abs((item.note.y ?? -120) - hitY) }))
        .sort((a, b) => a.distance - b.distance);

      if (!candidates.length) {
        registerMiss();
        return;
      }

      const best = candidates[0];
      if (best.distance <= PERFECT_WINDOW) {
        registerHit('perfect', key);
      } else if (best.distance <= GOOD_WINDOW) {
        registerHit('good', key);
      } else {
        registerMiss();
        return;
      }

      best.note.judged = true;
      best.note.el.remove();
      notes.splice(best.index, 1);
    }

    function getScores() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        return Array.isArray(raw) ? raw : [];
      } catch {
        return [];
      }
    }

    function saveScore() {
      const entry = { name: username.toUpperCase(), score };
      const existing = getScores();
      const topFive = [...existing, entry].sort((a, b) => b.score - a.score).slice(0, 5);
      const qualifies = topFive.some(item => item.name === entry.name && item.score === entry.score);
      if (existing.length >= 5 && !qualifies) return;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(topFive));
    }

    function ordinal(n) {
      return ['1ST', '2ND', '3RD'][n - 1] || `${n}TH`;
    }

    function renderScores() {
      const data = getScores();
      const rows = data.length ? data : [
        {name:'---',score:0},
        {name:'---',score:0},
        {name:'---',score:0},
        {name:'---',score:0},
        {name:'---',score:0}
      ];
      scoresBody.innerHTML = '';
      rows.slice(0,5).forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="rank">${ordinal(index+1)}</td><td class="score">${row.score}</td><td>${row.name}</td>`;
        scoresBody.appendChild(tr);
      });
    }

    function flashTarget(key) {
      const target = targets[key];
      if (!target) return;
      target.classList.add('active');
      setTimeout(() => target.classList.remove('active'), 80);
    }

    function wrapCharsForHover(element) {
      if (!element || element.dataset.staggerReady === '1') return;

      const walk = node => {
        Array.from(node.childNodes).forEach(child => {
          if (child.nodeType === Node.TEXT_NODE) {
            const raw = child.textContent;
            if (!raw || !raw.trim()) return;
            const frag = document.createDocumentFragment();
            Array.from(raw).forEach((ch, index) => {
              const span = document.createElement('span');
              span.className = 'char';
              span.style.setProperty('--char-index', String(index));
              span.textContent = ch === ' ' ? '\u00A0' : ch;
              frag.appendChild(span);
            });
            child.parentNode.replaceChild(frag, child);
          } else if (child.nodeType === Node.ELEMENT_NODE && child.tagName !== 'IMG') {
            walk(child);
          }
        });
      };

      walk(element);
      element.classList.add('hover-stagger');
      element.dataset.staggerReady = '1';
    }

    function setupHoverStagger() {
      document.querySelectorAll('.pixel-btn, .meta-row > div, .score-title, .helper, .summary > div, .copyright, .subtitle, .promo, .prompt').forEach(wrapCharsForHover);
    }

    function handleArrowInput(key) {
      flashTarget(key);
      if (gameActive) hitClosest(key);
    }

    function bindTapControls() {
      laneElements.forEach((laneEl, index) => {
        const key = laneTapMap[index];
        laneEl.dataset.key = key;
        laneEl.addEventListener('pointerdown', event => {
          event.preventDefault();
          handleArrowInput(key);
        }, { passive: false });
      });

      Object.entries(targets).forEach(([key, target]) => {
        target.addEventListener('pointerdown', event => {
          event.preventDefault();
          handleArrowInput(key);
        }, { passive: false });
      });
    }

    let lastButtonTapAt = 0;
    let startTransitionLock = false;
    let mobileAutoStartTimer = null;
    const isIPhone = /iPhone|iPod/i.test(navigator.userAgent || '');
    const isMobileAutoStart = false;

    function runOncePerTap(action) {
      const now = Date.now();
      if (now - lastButtonTapAt < 250) return;
      lastButtonTapAt = now;
      action();
    }

    function clearMobileAutoStart() {
      if (!mobileAutoStartTimer) return;
      clearTimeout(mobileAutoStartTimer);
      mobileAutoStartTimer = null;
    }

    function scheduleMobileAutoStart(immediate = false) {
      if (!isMobileAutoStart) return;
      if (!startScreen.classList.contains('active') || gameActive || gameScreen.classList.contains('active')) return;
      const typedName = (usernameInput.value || '').trim();
      if (!typedName) {
        clearMobileAutoStart();
        return;
      }
      clearMobileAutoStart();
      const launch = () => {
        mobileAutoStartTimer = null;
        forceStartGame();
      };
      if (immediate) {
        requestAnimationFrame(launch);
      } else {
        mobileAutoStartTimer = setTimeout(launch, 700);
      }
    }

    function forceStartGame() {
      clearMobileAutoStart();
      if (startTransitionLock || gameActive || gameScreen.classList.contains('active')) return;
      startTransitionLock = true;
      startGame();
      setTimeout(() => {
        startTransitionLock = false;
      }, 400);
    }

    function forceShowStart() {
      clearMobileAutoStart();
      gameActive = false;
      clearTimeout(spawnTimer);
      cancelAnimationFrame(animationFrame);
      showScreen(startScreen);
    }

    function initializeStartScreen() {
      clearMobileAutoStart();
      gameActive = false;
      clearTimeout(spawnTimer);
      cancelAnimationFrame(animationFrame);
      notes.forEach(note => note.el.remove());
      notes = [];
      showScreen(startScreen);
      document.body.setAttribute('data-ui-ready', '1');
      resetViewportPosition();
      renderScores();
    }

    function startGameFromForm(event) {
      if (event) event.preventDefault();
      if (document.activeElement && typeof document.activeElement.blur === 'function') {
        document.activeElement.blur();
      }
      runOncePerTap(forceStartGame);
      return false;
    }

    function showStartFromButton(event) {
      if (event) event.preventDefault();
      runOncePerTap(forceShowStart);
      return false;
    }

    window.startGameFromForm = startGameFromForm;
    window.__arrowAutoStart = immediate => scheduleMobileAutoStart(!!immediate);

    startForm.addEventListener('submit', startGameFromForm);
    playButton.addEventListener('click', startGameFromForm, { passive: false });
    playButton.addEventListener('touchend', startGameFromForm, { passive: false });
    playAgainButton.addEventListener('click', showStartFromButton, { passive: false });
    playAgainButton.addEventListener('touchend', showStartFromButton, { passive: false });

    usernameInput.addEventListener('input', () => clearMobileAutoStart());
    usernameInput.addEventListener('change', () => clearMobileAutoStart());
    usernameInput.addEventListener('blur', () => clearMobileAutoStart());
    usernameInput.addEventListener('keyup', event => {
      if (event.key === 'Enter' || event.key === 'Go' || event.key === 'Done') {
        event.preventDefault();
        forceStartGame();
        return;
      }
    });
    usernameInput.addEventListener('keydown', event => {
      if (event.key === 'Enter' || event.key === 'Go' || event.key === 'Done') {
        event.preventDefault();
        forceStartGame();
      }
    });
    window.addEventListener('keydown', event => {
      if (!Object.keys(lanes).includes(event.key)) return;
      event.preventDefault();
      handleArrowInput(event.key);
    });

    bindTapControls();
    setupHoverStagger();
    renderScores();
    initializeStartScreen();
    window.addEventListener('pageshow', initializeStartScreen);

  </script>
